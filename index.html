<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Cơm Niêu Ngon - Order Tại Bàn</title>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --momo: #A50064;
  --momo-dark: #7a004a;
  --momo-light: #d4368e;
  --momo-soft: #fce4f0;
  --gold: #d4af37;
  --gold-soft: #f5e6c8;
  --white: #ffffff;
  --bg: #faf5f8;
  --text: #1a1a1a;
  --text-2: #555;
  --text-3: #999;
  --border: #eee;
  --green: #2e7d32;
  --orange: #f57c00;
  --red: #d32f2f;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.15);
  --radius: 14px;
  --radius-sm: 10px;
}
html, body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
  background: #f0eef0;
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}
body { display: flex; justify-content: center; min-height: 100vh; }
#app {
  width: 100%;
  max-width: 420px;
  background: var(--bg);
  min-height: 100vh;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(0,0,0,0.1);
  display: flex;
  flex-direction: column;
}

/* ===== SCREENS ===== */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  opacity: 0;
  transform: translateX(30px);
  pointer-events: none;
  transition: opacity 0.3s ease, transform 0.3s ease;
  overflow: hidden;
}
.screen.active {
  opacity: 1;
  transform: translateX(0);
  pointer-events: auto;
}
.screen.exit-left { transform: translateX(-30px); }

.screen-header {
  background: linear-gradient(135deg, var(--momo) 0%, var(--momo-dark) 100%);
  color: #fff;
  padding: 14px 16px 12px;
  flex-shrink: 0;
  position: relative;
  z-index: 5;
}
.screen-header h1 { font-size: 18px; font-weight: 700; }
.screen-header .sub { font-size: 12px; opacity: 0.85; margin-top: 2px; }

.screen-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 72px;
}
.screen-body::-webkit-scrollbar { width: 0; }

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: #fff;
  display: flex;
  border-top: 1px solid var(--border);
  z-index: 100;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
  height: 64px;
}
.nav-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  color: var(--text-3);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: color 0.2s;
  position: relative;
}
.nav-tab svg { width: 22px; height: 22px; }
.nav-tab.active { color: var(--momo); }
.nav-tab.active svg { fill: var(--momo); }
.nav-badge {
  position: absolute;
  top: 6px; right: 50%;
  transform: translateX(14px);
  background: var(--momo);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  min-width: 18px; height: 18px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  padding: 0 4px;
  border: 1.5px solid #fff;
}

/* ===== MENU SCREEN ===== */
.menu-top {
  display: flex;
  align-items: center;
  gap: 8px;
}
.menu-top .logo {
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.menu-top .title-wrap { flex: 1; min-width: 0; }
.menu-top .resto-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.menu-top .table-no { font-size: 13px; font-weight: 600; opacity: 0.95; flex-shrink: 0; white-space: nowrap; background: rgba(255,255,255,0.18); padding: 4px 10px; border-radius: 8px; }

.search-row {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  background: #fff;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.search-box {
  flex: 1;
  display: flex;
  align-items: center;
  background: var(--bg);
  border-radius: 10px;
  padding: 0 12px;
  height: 40px;
  border: 1.5px solid transparent;
  transition: border 0.2s;
}
.search-box:focus-within { border-color: var(--momo); background: #fff; }
.search-box svg { width: 18px; height: 18px; color: var(--text-3); flex-shrink: 0; }
.search-box input {
  border: none; background: none; outline: none;
  flex: 1; font-size: 14px; margin-left: 8px;
}
.filter-dropdown {
  position: relative;
}
.filter-btn {
  height: 40px;
  padding: 0 12px;
  background: var(--bg);
  border: 1.5px solid transparent;
  border-radius: 10px;
  display: flex; align-items: center; gap: 4px;
  font-size: 13px; font-weight: 600; color: var(--text-2);
  cursor: pointer;
  white-space: nowrap;
  transition: border 0.2s;
}
.filter-btn.active { border-color: var(--momo); color: var(--momo); background: var(--momo-soft); }
.filter-btn svg { width: 16px; height: 16px; }
.filter-menu {
  position: absolute;
  top: 44px; right: 0;
  background: #fff;
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  padding: 6px 0;
  min-width: 160px;
  z-index: 50;
  display: none;
  overflow: hidden;
}
.filter-menu.open { display: block; animation: fadeIn 0.2s; }
.filter-menu div {
  padding: 10px 16px;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.15s;
}
.filter-menu div:hover { background: var(--bg); }
.filter-menu div.selected { color: var(--momo); font-weight: 600; background: var(--momo-soft); }

.cat-tabs {
  display: flex;
  gap: 8px;
  padding: 10px 16px;
  overflow-x: auto;
  background: #fff;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  scrollbar-width: none;
}
.cat-tabs::-webkit-scrollbar { display: none; }
.cat-tab {
  padding: 7px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  background: var(--bg);
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.2s;
  border: 1.5px solid transparent;
}
.cat-tab.active { background: var(--momo); color: #fff; }

.cat-group-title {
  padding: 14px 16px 6px;
  font-size: 14px;
  font-weight: 700;
  color: var(--momo);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.menu-list { padding: 6px 16px 16px; }
.menu-card {
  background: #fff;
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  display: flex;
  position: relative;
  transition: transform 0.15s;
}
.menu-card:active { transform: scale(0.98); }
.menu-card .img-wrap {
  width: 110px;
  height: 110px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  background: var(--bg);
}
.menu-card .img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.menu-card .img-wrap .placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 40px;
  background: var(--momo-soft);
}
.menu-card.soldout .img-wrap { filter: grayscale(1) brightness(0.6); }
.menu-card.soldout .img-wrap::after {
  content: 'Hết món';
  position: absolute;
  inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-weight: 700;
  font-size: 14px;
  background: rgba(0,0,0,0.45);
}
.badge {
  position: absolute;
  top: 6px; left: 6px;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 6px;
  color: #fff;
  z-index: 2;
}
.badge.hot { background: var(--red); }
.badge.rec { background: var(--orange); }
.menu-card .info {
  flex: 1;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-width: 0;
}
.menu-card .info .name {
  font-size: 15px;
  font-weight: 700;
  line-height: 1.3;
}
.menu-card .info .desc {
  font-size: 12px;
  color: var(--text-3);
  margin-top: 3px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.menu-card .bottom-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 6px;
}
.menu-card .price {
  font-size: 16px;
  font-weight: 700;
  color: var(--momo);
}
.add-btn {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--momo);
  color: #fff;
  border: none;
  font-size: 24px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: transform 0.15s, background 0.2s;
  line-height: 1;
}
.add-btn:active { transform: scale(0.9); }
.add-btn:disabled { background: #ccc; cursor: not-allowed; }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-3);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }

/* ===== DETAIL SCREEN ===== */
.detail-img {
  width: 100%;
  height: 240px;
  position: relative;
  overflow: hidden;
  background: var(--bg);
  flex-shrink: 0;
}
.detail-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.detail-img .placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 70px; background: var(--momo-soft); }
.detail-back {
  position: absolute;
  top: 12px; left: 12px;
  width: 38px; height: 38px;
  border-radius: 50%;
  background: rgba(0,0,0,0.4);
  color: #fff;
  border: none;
  font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  z-index: 3;
  backdrop-filter: blur(4px);
}
.detail-badge {
  position: absolute;
  top: 14px; right: 14px;
  z-index: 3;
}
.detail-content {
  padding: 16px;
  overflow-y: auto;
  flex: 1;
}
.detail-content h2 { font-size: 20px; font-weight: 700; }
.detail-content .detail-desc {
  font-size: 14px;
  color: var(--text-2);
  margin-top: 8px;
  line-height: 1.6;
}
.detail-section { margin-top: 18px; }
.detail-section .label {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-2);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.ingredients-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.ingredients-list span {
  background: var(--momo-soft);
  color: var(--momo-dark);
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 8px;
}
.opt-group { display: flex; gap: 8px; flex-wrap: wrap; }
.opt-chip {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.2s;
  background: #fff;
}
.opt-chip.selected { border-color: var(--momo); background: var(--momo-soft); color: var(--momo); }
.opt-check {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  background: #fff;
}
.opt-check.selected { border-color: var(--momo); background: var(--momo-soft); color: var(--momo); }
.opt-check .check-box {
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.opt-check.selected .check-box { background: var(--momo); border-color: var(--momo); }
.opt-check.selected .check-box::after { content: '✓'; color: #fff; font-size: 14px; font-weight: 700; }
.note-input {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 14px;
  resize: none;
  outline: none;
  font-family: inherit;
  transition: border 0.2s;
}
.note-input:focus { border-color: var(--momo); }
.qty-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 18px;
}
.qty-control {
  display: flex;
  align-items: center;
  gap: 16px;
}
.qty-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1.5px solid var(--momo);
  background: #fff;
  color: var(--momo);
  font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
}
.qty-btn:active { transform: scale(0.9); }
.qty-num { font-size: 20px; font-weight: 700; min-width: 30px; text-align: center; }
.detail-price {
  font-size: 22px;
  font-weight: 700;
  color: var(--momo);
}
.add-cart-btn {
  width: 100%;
  height: 50px;
  background: linear-gradient(135deg, var(--momo), var(--momo-dark));
  color: #fff;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: transform 0.15s;
  box-shadow: 0 4px 16px rgba(165,0,100,0.3);
}
.add-cart-btn:active { transform: scale(0.97); }

/* ===== CART SCREEN ===== */
.cart-section {
  padding: 14px 16px;
}
.cart-section-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.cart-item {
  background: #fff;
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
}
.cart-item-header {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.cart-item-header img {
  width: 56px; height: 56px;
  border-radius: 10px;
  object-fit: cover;
  flex-shrink: 0;
}
.cart-item-header .placeholder {
  width: 56px; height: 56px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  background: var(--momo-soft);
  flex-shrink: 0;
}
.cart-item-info { flex: 1; min-width: 0; }
.cart-item-name { font-size: 15px; font-weight: 700; }
.cart-item-opts { font-size: 12px; color: var(--text-3); margin-top: 3px; line-height: 1.4; }
.cart-item-price { font-size: 15px; font-weight: 700; color: var(--momo); margin-top: 4px; }
.cart-item-actions { display: flex; gap: 8px; margin-top: 10px; }
.cart-btn {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: #fff;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.2s;
}
.cart-btn.edit { color: var(--momo); border-color: var(--momo); }
.cart-btn.remove { color: var(--red); border-color: var(--red); }
.cart-btn:active { transform: scale(0.95); }

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 6px;
  margin-top: 6px;
}
.status-pending { background: #fff3e0; color: var(--orange); }
.status-received { background: #e3f2fd; color: #1565c0; }
.status-cooking { background: #fce4ec; color: var(--momo); }
.status-served { background: #e8f5e9; color: var(--green); }
.status-rejected { background: #ffebee; color: var(--red); }

.progress-wrap {
  margin-top: 8px;
  display: none;
}
.progress-wrap.show { display: block; }
.progress-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--momo), var(--momo-light));
  border-radius: 3px;
  transition: width 0.5s ease;
}
.progress-label {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 4px;
  display: flex;
  justify-content: space-between;
}

.cart-summary {
  background: #fff;
  border-radius: var(--radius);
  padding: 14px 16px;
  margin: 8px 16px 16px;
  box-shadow: var(--shadow);
}
.summary-row {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  padding: 5px 0;
  color: var(--text-2);
}
.summary-row.total {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  border-top: 1px solid var(--border);
  margin-top: 6px;
  padding-top: 10px;
}
.summary-row.total .val { color: var(--momo); }

.call-more-btn {
  width: 100%;
  height: 44px;
  border: 1.5px dashed var(--momo);
  background: var(--momo-soft);
  color: var(--momo);
  border-radius: 12px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 12px;
  transition: all 0.2s;
}
.call-more-btn:active { transform: scale(0.97); }

.confirm-order-btn {
  width: calc(100% - 32px);
  height: 50px;
  background: linear-gradient(135deg, var(--momo), var(--momo-dark));
  color: #fff;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  margin: 0 16px 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 0 4px 16px rgba(165,0,100,0.3);
  transition: transform 0.15s;
}
.confirm-order-btn:active { transform: scale(0.97); }
.confirm-order-btn:disabled { background: #ccc; box-shadow: none; }

/* ===== ORDER SCREEN ===== */
.order-top-btns {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 14px 16px;
  background: #fff;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.order-top-btn {
  flex: 1;
  max-width: 110px;
  height: 44px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: #fff;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  transition: all 0.2s;
}
.order-top-btn:active { transform: scale(0.95); }
.order-top-btn svg { width: 18px; height: 18px; }

.order-history-item {
  background: #fff;
  border-radius: var(--radius);
  padding: 12px;
  margin: 0 16px 10px;
  box-shadow: var(--shadow);
  display: flex;
  gap: 10px;
}
.order-history-item img {
  width: 50px; height: 50px;
  border-radius: 8px;
  object-fit: cover;
  flex-shrink: 0;
}
.order-history-item .placeholder {
  width: 50px; height: 50px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  background: var(--momo-soft);
  flex-shrink: 0;
}
.order-history-item .oi-info { flex: 1; min-width: 0; }
.order-history-item .oi-name { font-size: 14px; font-weight: 700; }
.order-history-item .oi-opts { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.order-history-item .oi-price { font-size: 14px; font-weight: 700; color: var(--momo); margin-top: 3px; }
.reject-reason {
  font-size: 12px;
  color: var(--red);
  margin-top: 4px;
  font-style: italic;
}

.call-pay-btn {
  width: calc(100% - 32px);
  height: 50px;
  background: linear-gradient(135deg, var(--momo), var(--momo-dark));
  color: #fff;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  margin: 16px;
  box-shadow: 0 4px 16px rgba(165,0,100,0.3);
  transition: transform 0.15s;
}
.call-pay-btn:active { transform: scale(0.97); }

/* ===== PAYMENT SCREEN ===== */
.pay-section {
  padding: 14px 16px 8px;
}
.pay-section-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 10px;
}
.pay-method {

}

.pay-method .pm-desc { font-size: 12px; color: var(--text-3); margin-top: 2px; }

.qr-box {
  text-align: center;
  padding: 20px;
  background: #fff;
  border-radius: 12px;
  margin-bottom: 10px;

  background: #fff;
  border: 2px solid var(--border);
  border-radius: 12px;
  margin: 0 auto 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.card-form { display: none; }
.card-form.show { display: block; animation: fadeIn 0.3s; }

.tip-row {

  font-size: 13px;

.pay-summary {

/* ===== MODAL / POPUP ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(2px);
}
.modal-overlay.show { display: flex; animation: fadeIn 0.2s; }
.modal {
  background: #fff;
  border-radius: 18px;
  width: 100%;
  max-width: 340px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 24px 20px;

.modal h3 {
  font-size: 18px;
  font-weight: 700;
  text-align: center;

}

  margin: 0 auto 14px;
  font-size: 32px;
}

}
.modal-btn {
  width: 100%;
  height: 46px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;

}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;

  color: #fff;
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  z-index: 2000;
  transition: transform 0.3s ease;
  white-space: nowrap;

}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--green); }
.toast.error { background: var(--red); }

/* ===== ANIMATIONS ===== */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

// ===== STATE =====
let currentScreen = 'menu';
let currentCat = 'all';
let currentFilter = 'all';
let searchQuery = '';
let currentDish = null;
let detailQty = 1;
let detailSpice = null;
let detailServe = 'now';
let detailSides = [];
let detailNote = '';
let cart = [];
let placedOrders = [];

let memberInfo = null;

let selectedTip = null;

// ===== HELPERS =====
const fmt = (v) => v.toLocaleString('vi-VN') + 'đ';
const $ = (id) => document.getElementById(id);

function showToast(msg, type='') {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 2200);
}

function openModal(html) {
  $('modalContent').innerHTML = html;
  $('modalOverlay').classList.add('show');
}
function closeModal() {
  $('modalOverlay').classList.remove('show');
}
function closeModalOnOverlay(e) {
  if (e.target === $('modalOverlay')) closeModal();
}

function imgHtml(url, name, cls) {
  return `<img src="${url||''}" alt="${name}" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><span class="${cls}" style="display:none">${currentDish ? currentDish.icon : '🍚'}</span>`;
}

// ===== SCREEN NAVIGATION =====
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active','exit-left'));
  $('screen-' + name).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.screen === name));
  currentScreen = name;
  if (name === 'cart') renderCart();
  if (name === 'order') renderOrder();
  if (name === 'pay') renderPayment();
  if (name === 'menu') renderMenu();
  $('screen-' + name).querySelector('.screen-body, .detail-content')?.scrollTo(0, 0);
}

// ===== MENU SCREEN =====
function renderCatTabs() {
  $('catTabs').innerHTML = CATEGORIES.map(c =>
    `<div class="cat-tab ${c.id===currentCat?'active':''}" onclick="selectCat('${c.id}')">${c.name}</div>`
  ).join('');
}

function renderFilterMenu() {
  $('filterMenu').innerHTML = FILTER_OPTIONS.map(f =>
    `<div class="${f.id===currentFilter?'selected':''}" onclick="selectFilter('${f.id}')">${f.name}</div>`
  ).join('');
  $('filterLabel').textContent = FILTER_OPTIONS.find(f => f.id === currentFilter).name.replace('Tất cả loại','Lọc');
  $('filterBtn').classList.toggle('active', currentFilter !== 'all');
}

function toggleFilter() {
  $('filterMenu').classList.toggle('open');
}
function selectFilter(id) {
  currentFilter = id;
  renderFilterMenu();
  $('filterMenu').classList.remove('open');
  renderMenu();
}
function selectCat(id) {
  currentCat = id;
  renderCatTabs();
  renderMenu();
}

function handleSearch() {
  searchQuery = $('searchInput').value.toLowerCase().trim();
  renderMenu();
}

function renderMenu() {
  let items = MENU.filter(d => {
    const matchSearch = !searchQuery || d.name.toLowerCase().includes(searchQuery);
    const matchFilter = currentFilter === 'all' || d.cat === currentFilter;
    return matchSearch && matchFilter;
  });

  if (currentCat === 'all' && !searchQuery && currentFilter === 'all') {
    // Group by category in order
    let html = '';
    CAT_ORDER.forEach(catId => {
      const catItems = items.filter(d => d.cat === catId);
      if (catItems.length === 0) return;
      const catName = CATEGORIES.find(c => c.id === catId).name;
      html += `<div class="cat-group-title">${catName}</div>`;
      html += catItems.map(d => menuCardHtml(d)).join('');
    });
    $('menuList').innerHTML = html || emptyHtml();
    return;
  }

  if (currentCat !== 'all') {
    items = items.filter(d => d.cat === currentCat);
  }

  if (items.length === 0) {
    $('menuList').innerHTML = emptyHtml();
    return;
  }
  $('menuList').innerHTML = items.map(d => menuCardHtml(d)).join('');
}

function emptyHtml() {
  return `<div class="empty-state"><div class="icon">🔍</div>Không tìm thấy món ăn nào</div>`;
}

function menuCardHtml(d) {
  const badgeHtml = d.badge === 'hot' ? '<span class="badge hot">Bán chạy</span>' :
                    d.badge === 'rec' ? '<span class="badge rec">Đề xuất</span>' : '';
  const soldoutHtml = d.soldout ? 'soldout' : '';
  return `
    <div class="menu-card ${soldoutHtml}" onclick="${d.soldout ? '' : `openDetail(${d.id})`}">
      <div class="img-wrap">
        ${badgeHtml}
        <img src="${d.img||''}" alt="${d.name}" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
        <span class="placeholder" style="display:none">${d.icon}</span>
      </div>
      <div class="info">
        <div>
          <div class="name">${d.name}</div>
          <div class="desc">${d.desc}</div>
        </div>
        <div class="bottom-row">
          <div class="price">${fmt(d.price)}</div>
          <button class="add-btn" ${d.soldout?'disabled':''} onclick="event.stopPropagation();${d.soldout?'':`openDetail(${d.id})`}">+</button>
        </div>
      </div>
    </div>
  `;
}

// ===== DETAIL SCREEN =====
function openDetail(id) {
  currentDish = MENU.find(d => d.id === id);
  detailQty = 1;
  detailSpice = 'normal';
  detailServe = 'now';
  detailSides = [];
  detailNote = '';
  renderDetail();
  showScreen('detail');
}

function renderDetail() {
  const d = currentDish;
  const badgeHtml = d.badge === 'hot' ? '<span class="badge hot" style="position:relative;top:0;left:0;display:inline-block;margin-bottom:8px">Bán chạy</span>' :
                    d.badge === 'rec' ? '<span class="badge rec" style="position:relative;top:0;left:0;display:inline-block;margin-bottom:8px">Đề xuất</span>' : '';

  $('detailImg').innerHTML = `
    <button class="detail-back" onclick="showScreen('menu')">←</button>
    ${d.badge === 'hot' ? '<span class="badge hot detail-badge">Bán chạy</span>' : ''}
    ${d.badge === 'rec' ? '<span class="badge rec detail-badge">Đề xuất</span>' : ''}
    <img src="${d.img||''}" alt="${d.name}" referrerpolicy="no-referrer" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
    <span class="placeholder" style="display:none">${d.icon}</span>
  `;

  const sideHtml = SIDE_DISHES.map(s => `
    <div class="opt-check ${detailSides.includes(s.id)?'selected':''}" onclick="toggleSide('${s.id}')">
      <div class="check-box"></div>
      <span>${s.name} (+${fmt(s.price)})</span>
    </div>
  `).join('');

  $('detailContent').innerHTML = `
    <h2>${d.name}</h2>
    ${badgeHtml}
    <div class="detail-desc">${d.desc}</div>
    <div class="detail-section">
      <div class="label">Thành phần</div>
      <div class="ingredients-list">${d.ingredients.map(i => `<span>${i}</span>`).join('')}</div>
    </div>
    <div class="detail-section">
      <div class="label">Mức độ cay</div>
      <div class="opt-group">
        ${SPICE_LEVELS.map(s => `<div class="opt-chip ${detailSpice===s.id?'selected':''}" onclick="selectSpice('${s.id}')">${s.name}</div>`).join('')}
      </div>
    </div>
    <div class="detail-section">
      <div class="label">Thời gian phục vụ</div>
      <div class="opt-group">
        ${SERVE_TIMES.map(s => `<div class="opt-chip ${detailServe===s.id?'selected':''}" onclick="selectServe('${s.id}')">${s.name}</div>`).join('')}
      </div>
    </div>
    <div class="detail-section">
      <div class="label">Món ăn kèm</div>
      <div class="opt-group" style="flex-direction:column;gap:8px">${sideHtml}</div>
    </div>
    <div class="detail-section">
      <div class="label">Ghi chú cho bếp</div>
      <textarea class="note-input" rows="2" placeholder="VD: chín vừa, để nước mắm riêng, không cho đường..." oninput="detailNote=this.value"></textarea>
    </div>
    <div class="qty-row">
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <span class="qty-num" id="qtyNum">${detailQty}</span>
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
      <div class="detail-price" id="detailPrice">${fmt(calcDetailPrice())}</div>
    </div>
    <button class="add-cart-btn" onclick="addToCart()">Thêm vào giỏ hàng · ${fmt(calcDetailPrice())}</button>
  `;
}

function selectSpice(id) { detailSpice = id; renderDetail(); }
function selectServe(id) { detailServe = id; renderDetail(); }
function toggleSide(id) {
  if (detailSides.includes(id)) detailSides = detailSides.filter(s => s !== id);
  else detailSides.push(id);
  renderDetail();
}
function changeQty(delta) {
  detailQty = Math.max(1, detailQty + delta);
  $('qtyNum').textContent = detailQty;
  $('detailPrice').textContent = fmt(calcDetailPrice());
  const btn = document.querySelector('.add-cart-btn');
  btn.textContent = 'Thêm vào giỏ hàng · ' + fmt(calcDetailPrice());
}
function calcDetailPrice() {
  let p = currentDish.price;
  detailSides.forEach(sid => { p += SIDE_DISHES.find(s => s.id === sid).price; });
  return p * detailQty;
}

function addToCart() {
  if (!detailSpice) { detailSpice = 'normal'; }
  const sideNames = detailSides.map(sid => SIDE_DISHES.find(s => s.id === sid).name);
  const sideTotal = detailSides.reduce((sum, sid) => sum + SIDE_DISHES.find(s => s.id === sid).price, 0);
  cart.push({
    cartId: Date.now() + Math.random(),
    dishId: currentDish.id,
    name: currentDish.name,
    img: currentDish.img,
    icon: currentDish.icon,
    qty: detailQty,
    spice: detailSpice,
    serve: detailServe,
    sides: [...detailSides],
    sideNames: sideNames,
    note: detailNote,
    basePrice: currentDish.price,
    sideTotal: sideTotal,
    unitPrice: currentDish.price + sideTotal,
    totalPrice: (currentDish.price + sideTotal) * detailQty,
    status: 'pending',
    progress: 0,
  });
  updateCartBadge();
  showToast('✓ Đã thêm "' + currentDish.name + '" vào giỏ hàng', 'success');
  setTimeout(() => showScreen('menu'), 600);
}

// ===== CART SCREEN =====
function updateCartBadge() {
  const count = cart.length;
  const badge = $('cartBadge');
  badge.style.display = count > 0 ? 'flex' : 'none';
  badge.textContent = count;
}

function renderCart() {
  let html = '';

  // Món đang chọn
  html += '<div class="cart-section">';
  html += '<div class="cart-section-title">🛒 Món đang chọn</div>';
  if (cart.length === 0) {
    html += '<div class="empty-state" style="padding:30px 20px"><div class="icon">🛒</div>Giỏ hàng trống</div>';
  } else {
    cart.forEach(item => {
      html += cartItemHtml(item, true);
    });
    html += '<button class="call-more-btn" onclick="showScreen(\'menu\')">+ Gọi thêm món</button>';
  }
  html += '</div>';

  // Món đã đặt
  if (placedOrders.length > 0) {
    html += '<div class="cart-section">';
    html += '<div class="cart-section-title">📋 Món đã đặt</div>';
    placedOrders.forEach(item => {
      html += cartItemHtml(item, false);
    });
    html += '</div>';
  }

  // Tạm tính
  if (cart.length > 0 || placedOrders.length > 0) {
    const { subtotal, vat, service, total } = calcTotals();
    html += '<div class="cart-summary">';
    html += `<div class="summary-row"><span>Tạm tính</span><span>${fmt(subtotal)}</span></div>`;
    html += `<div class="summary-row"><span>VAT (8%)</span><span>${fmt(vat)}</span></div>`;
    html += `<div class="summary-row"><span>Phí phục vụ (5%)</span><span>${fmt(service)}</span></div>`;
    html += `<div class="summary-row total"><span>Tổng</span><span class="val">${fmt(total)}</span></div>`;
    html += '</div>';
    html += `<button class="confirm-order-btn" onclick="confirmOrder()">Xác nhận đặt món</button>`;
  }

  $('cartBody').innerHTML = html;
}

function cartItemHtml(item, isPending) {
  const spiceName = SPICE_LEVELS.find(s => s.id === item.spice)?.name || 'Chưa chọn cay';
  const serveName = SERVE_TIMES.find(s => s.id === item.serve)?.name || '';
  const optsText = [spiceName, serveName, item.sideNames.length > 0 ? 'Kèm: ' + item.sideNames.join(', ') : ''].filter(Boolean).join(' · ');
  const noteText = item.note ? `<div style="font-size:12px;color:var(--text-3);margin-top:2px;font-style:italic">📝 ${item.note}</div>` : '';

  const statusHtml = isPending ? '' : statusBadgeHtml(item.status, item.rejectReason);
  const progressHtml = (isPending || item.status === 'rejected') ? '' : `
    <div class="progress-wrap show">
      <div class="progress-bar"><div class="progress-fill" style="width:${item.progress}%"></div></div>
      <div class="progress-label"><span>${statusLabel(item.status)}</span><span>${item.progress}%</span></div>
    </div>
  `;

  const actionsHtml = isPending ? `
    <div class="cart-item-actions">
      <button class="cart-btn edit" onclick="editCartItem('${item.cartId}')">Sửa</button>
      <button class="cart-btn remove" onclick="removeCartItem('${item.cartId}')">Bỏ món</button>
    </div>
  ` : '';

  return `
    <div class="cart-item">
      <div class="cart-item-header">
        <img src="${item.img||''}" alt="${item.name}" referrerpolicy="no-referrer" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
        <span class="placeholder" style="display:none">${item.icon}</span>
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name} ×${item.qty}</div>
          <div class="cart-item-opts">${optsText}</div>
          ${noteText}
          <div class="cart-item-price">${fmt(item.totalPrice)}</div>
          ${statusHtml}
        </div>
      </div>
      ${progressHtml}
      ${actionsHtml}
    </div>
  `;
}

function statusBadgeHtml(status, reason) {
  const map = {
    pending: { cls: 'status-pending', label: 'Chờ xử lý' },
    received: { cls: 'status-received', label: 'Đã nhận đơn' },
    cooking: { cls: 'status-cooking', label: 'Đang chế biến' },
    served: { cls: 'status-served', label: 'Đã phục vụ' },
    rejected: { cls: 'status-rejected', label: 'Từ chối' },
  };
  const s = map[status];
  if (!s) return '';
  let html = `<span class="${s.cls}">${s.label}</span>`;
  if (status === 'rejected' && reason) {
    html += `<div class="reject-reason">Lý do: ${reason}</div>`;
  }
  return html;
}

function statusLabel(status) {
  const map = {
    pending: 'Chờ xử lý',
    received: 'Đã nhận đơn',
    cooking: 'Đang chế biến',
    served: 'Đã phục vụ',
    rejected: 'Từ chối',
  };
  return map[status] || '';
}

function editCartItem(cartId) {
  const item = cart.find(c => c.cartId == cartId);
  if (!item) return;
  openEditModal(item);
}

function openEditModal(item) {
  let editSpice = item.spice;
  let editServe = item.serve;
  let editSides = [...item.sides];
  let editNote = item.note;
  let editQty = item.qty;

  const render = () => {
    const sideHtml = SIDE_DISHES.map(s => `
      <div class="opt-check ${editSides.includes(s.id)?'selected':''}" onclick="window._editToggle('${s.id}')">
        <div class="check-box"></div>
        <span>${s.name} (+${fmt(s.price)})</span>
      </div>
    `).join('');

    const unitPrice = item.basePrice + editSides.reduce((sum, sid) => sum + SIDE_DISHES.find(s => s.id === sid).price, 0);
    const total = unitPrice * editQty;

    $('modalContent').innerHTML = `
      <h3>Sửa món</h3>
      <div style="font-weight:700;margin-bottom:12px">${item.name}</div>
      <div class="detail-section" style="margin-top:0">
        <div class="label">Mức độ cay</div>
        <div class="opt-group">
          ${SPICE_LEVELS.map(s => `<div class="opt-chip ${editSpice===s.id?'selected':''}" onclick="window._editSpice('${s.id}')">${s.name}</div>`).join('')}
        </div>
      </div>
      <div class="detail-section">
        <div class="label">Thời gian phục vụ</div>
        <div class="opt-group">
          ${SERVE_TIMES.map(s => `<div class="opt-chip ${editServe===s.id?'selected':''}" onclick="window._editServe('${s.id}')">${s.name}</div>`).join('')}
        </div>
      </div>
      <div class="detail-section">
        <div class="label">Món ăn kèm</div>
        <div class="opt-group" style="flex-direction:column;gap:8px">${sideHtml}</div>
      </div>
      <div class="detail-section">
        <div class="label">Ghi chú cho bếp</div>
        <textarea class="note-input" rows="2" id="editNoteInput" oninput="window._editNote=this.value">${editNote}</textarea>
      </div>
      <div class="qty-row">
        <div class="qty-control">
          <button class="qty-btn" onclick="window._editQty(-1)">−</button>
          <span class="qty-num" id="editQtyNum">${editQty}</span>
          <button class="qty-btn" onclick="window._editQty(1)">+</button>
        </div>
        <div class="detail-price">${fmt(total)}</div>
      </div>
      <button class="modal-btn primary" onclick="window._saveEdit()">Lưu thay đổi</button>
      <button class="modal-btn secondary" onclick="closeModal()">Hủy</button>
    `;
  };

  window._editSpice = (id) => { editSpice = id; render(); };
  window._editServe = (id) => { editServe = id; render(); };
  window._editToggle = (id) => {
    if (editSides.includes(id)) editSides = editSides.filter(s => s !== id);
    else editSides.push(id);
    render();
  };
  window._editNote = editNote;
  window._editQty = (delta) => {
    editQty = Math.max(1, editQty + delta);
    render();
  };
  window._saveEdit = () => {
    item.spice = editSpice;
    item.serve = editServe;
    item.sides = [...editSides];
    item.sideNames = editSides.map(sid => SIDE_DISHES.find(s => s.id === sid).name);
    item.note = $('editNoteInput').value;
    item.qty = editQty;
    item.sideTotal = editSides.reduce((sum, sid) => sum + SIDE_DISHES.find(s => s.id === sid).price, 0);
    item.unitPrice = item.basePrice + item.sideTotal;
    item.totalPrice = item.unitPrice * item.qty;
    closeModal();
    renderCart();
    showToast('✓ Đã cập nhật món', 'success');
  };

  render();
  openModal('');
  render();
}

function removeCartItem(cartId) {
  cart = cart.filter(c => c.cartId != cartId);
  updateCartBadge();
  renderCart();
  showToast('Đã bỏ món khỏi giỏ', '');
}

function calcTotals() {
  const allItems = [...cart, ...placedOrders.filter(o => o.status !== 'rejected')];
  let subtotal = allItems.reduce((sum, item) => sum + item.totalPrice, 0);
  let discount = 0;
  if (appliedCoupon) {
    if (appliedCoupon.type === 'percent') discount = Math.round(subtotal * appliedCoupon.value / 100);
    else discount = Math.min(appliedCoupon.value, subtotal);
  }
  const afterDiscount = subtotal - discount;
  const vat = Math.round(afterDiscount * 0.08);
  const service = Math.round(afterDiscount * 0.05);
  const total = afterDiscount + vat + service;
  return { subtotal, discount, vat, service, total };
}

function confirmOrder() {
  if (cart.length === 0) { showToast('Giỏ hàng trống', 'error'); return; }
  cart.forEach(item => {
    item.status = 'pending';
    item.progress = 0;
    placedOrders.push(item);
  });
  cart = [];
  updateCartBadge();
  showToast('✓ Đã xác nhận đặt món', 'success');
  renderCart();
  // Simulate progress
  startProgressSimulation();
}

let progressInterval = null;
function startProgressSimulation() {
  if (progressInterval) clearInterval(progressInterval);
  progressInterval = setInterval(() => {
    let activeCount = 0;
    placedOrders.forEach(item => {
      if (item.status === 'pending') {
        item.status = 'received';
        item.progress = 20;
        activeCount++;
      } else if (item.status === 'received') {
        item.progress = Math.min(60, item.progress + 10);
        if (item.progress >= 60) item.status = 'cooking';
        activeCount++;
      } else if (item.status === 'cooking') {
        item.progress = Math.min(100, item.progress + 8);
        if (item.progress >= 100) item.status = 'served';
        activeCount++;
      }
    });
    if (currentScreen === 'cart') renderCart();
    if (currentScreen === 'order') renderOrder();
    if (activeCount === 0 && progressInterval) { clearInterval(progressInterval); progressInterval = null; }
  }, 2000);
}

function resetAll() {
  cart = [];
  placedOrders = [];
  appliedCoupon = null;
  selectedPayMethod = null;
  selectedTip = null;
  tipCustom = 0;
  paySubOption = null;
  updateCartBadge();
  if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
}

// ===== INIT =====
function init() {
  renderCatTabs();
  renderFilterMenu();
  renderMenu();

  // Add sample placed order with rejected status
  placedOrders.push({
    cartId: 'sample-1',
    dishId: 12,
    name: 'Canh chua cá lóc',
    img: 'https://daotaobeptruong.vn/wp-content/uploads/2020/03/canh-chua-ca-loc.jpg',
    icon: '🍲',
    qty: 1,
    spice: 'little',
    serve: 'now',
    sides: [],
    sideNames: [],
    note: '',
    basePrice: 69000,
    sideTotal: 0,
    unitPrice: 69000,
    totalPrice: 69000,
    status: 'rejected',
    progress: 0,
    rejectReason: 'Hết nguyên liệu',
  });

  // Close filter on outside click
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.filter-dropdown')) {
      $('filterMenu').classList.remove('open');
    }
  });
}

init();
</script>
